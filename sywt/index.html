    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: #1a2744; color: #e0e0e0; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .unlock-box { background: #223050; border-radius: 12px; padding: 40px;
                      max-width: 380px; width: 90%; text-align: center;
                      box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .unlock-box h1 { font-size: 1.4rem; margin-bottom: 6px; color: #fff; }
        .unlock-box p { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
        .unlock-box .version-info { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
        .unlock-box input { width: 100%; padding: 10px 14px; border-radius: 6px;
                            border: 1px solid rgba(255,255,255,0.2); background: #1a2744;
                            color: #fff; font-size: 1rem; outline: none;
                            margin-bottom: 12px; }
        .unlock-box input:focus { border-color: #e8913a; }
        .unlock-box button { width: 100%; padding: 10px; border-radius: 6px; border: none;
                             background: #e8913a; color: #fff; font-size: 1rem;
                             font-weight: 600; cursor: pointer; }
        .unlock-box button:hover { background: #d07e2f; }
        .error { color: #ff6b6b; font-size: 0.82rem; margin-top: 8px; display: none; }
        .spinner { display: none; margin: 8px auto 0; width: 20px; height: 20px;
                   border: 2px solid rgba(255,255,255,0.3); border-top-color: #e8913a;
                   border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

        function b64decode(s) {
            const bin = atob(s);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return arr;
        }

        async function unlock(e) {
            e.preventDefault();
            const pw = document.getElementById("pw").value;
            const err = document.getElementById("err");
            const spin = document.getElementById("spin");
            const btn = document.getElementById("btn");
            err.style.display = "none";
            spin.style.display = "block";
            btn.disabled = true;

            try {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey(
                    "raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]
                );
                const key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: b64decode(SALT), iterations: 100000, hash: "SHA-256" },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["decrypt"]
                );
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: b64decode(IV) },
                    key,
                    b64decode(CT)
                );
                const html = new TextDecoder().decode(decrypted);
                document.open();
                document.write(html);
                document.close();
            } catch(ex) {
                spin.style.display = "none";
                btn.disabled = false;
                err.style.display = "block";
                document.getElementById("pw").select();
            }
            return false;
        }
    </script>
