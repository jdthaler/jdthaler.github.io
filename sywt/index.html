    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: #1a2744; color: #e0e0e0; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .unlock-box { background: #223050; border-radius: 12px; padding: 40px;
                      max-width: 380px; width: 90%; text-align: center;
                      box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .unlock-box h1 { font-size: 1.4rem; margin-bottom: 6px; color: #fff; }
        .unlock-box p { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
        .unlock-box .version-info { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
        .unlock-box input { width: 100%; padding: 10px 14px; border-radius: 6px;
                            border: 1px solid rgba(255,255,255,0.2); background: #1a2744;
                            color: #fff; font-size: 1rem; outline: none;
                            margin-bottom: 12px; }
        .unlock-box input:focus { border-color: #e8913a; }
        .unlock-box button { width: 100%; padding: 10px; border-radius: 6px; border: none;
                             background: #e8913a; color: #fff; font-size: 1rem;
                             font-weight: 600; cursor: pointer; }
        .unlock-box button:hover { background: #d07e2f; }
        .error { color: #ff6b6b; font-size: 0.82rem; margin-top: 8px; display: none; }
        .progress-area { display: none; margin-top: 12px; text-align: center; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1);
                        border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
        .progress-fill { height: 100%; width: 0%; background: #e8913a;
                         transition: width 0.2s ease; }
        .progress-text { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
    </style>

        function b64decode(s) {
            // Use fetch + data URI for fast native base64 decoding
            const bin = atob(s);
            const len = bin.length;
            const arr = new Uint8Array(len);
            // Process in 8KB chunks to avoid blocking UI
            for (let i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);
            return arr;
        }

        function setProgress(pct, text) {
            document.getElementById("bar").style.width = pct + "%";
            document.getElementById("status").textContent = text;
        }

        // Yield to the browser so the UI can repaint
        const tick = () => new Promise(r => setTimeout(r, 0));

        async function unlock(e) {
            e.preventDefault();
            const pw = document.getElementById("pw").value;
            const err = document.getElementById("err");
            const prog = document.getElementById("progress");
            const btn = document.getElementById("btn");
            err.style.display = "none";
            prog.style.display = "block";
            btn.disabled = true;
            setProgress(10, "Deriving key...");
            await tick();

            try {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey(
                    "raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]
                );
                const key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: b64decode(SALT), iterations: 100000, hash: "SHA-256" },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["decrypt"]
                );
                setProgress(40, "Decrypting...");
                await tick();

                const ctBytes = b64decode(CT);
                setProgress(60, "Decrypting...");
                await tick();

                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: b64decode(IV) },
                    key,
                    ctBytes
                );
                setProgress(80, "Loading document...");
                await tick();

                const html = new TextDecoder().decode(decrypted);
                setProgress(95, "Rendering...");
                await tick();

                document.open();
                document.write(html);
                document.close();
            } catch(ex) {
                prog.style.display = "none";
                btn.disabled = false;
                err.style.display = "block";
                document.getElementById("pw").select();
            }
            return false;
        }
    </script>
